services:
  raptortracker:
    build: .
    container_name: raptortracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - raptortracker_data:/data
    environment:
      - PORT=3000
      - SESSION_SECRET=changeme_in_production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme_in_production
      - DATA_DIR=/data
      - UPLOAD_DIR=/data/uploads

volumes:
  raptortracker_data:
